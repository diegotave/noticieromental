<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objeto 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

#slider{
  display:flex;
  width:300%;
  height:100%;
  transition:transform 0.35s ease;
}

.page{
  width:100vw;
  height:100vh;
  position:relative;
  flex:0 0 100vw;
  overflow:hidden;
}

#page1{ background:yellow; }
#page2{ background:black; }
#page3{ background:black; }

model-viewer{
  width:100%;
  height:100%;
  background:transparent;
}

/* CONTENEDORES DE VIDEO */

.video-frame{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:black;
}

.video-shell{
  position:relative;
  width:min(100vw, calc(100vh * 16 / 9));
  aspect-ratio:16 / 9;
  overflow:hidden;
  background:black;
}

#video2,
#video3{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  background:black;
}

/* FLECHAS */

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  height:120px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.arrow::before{
  content:"";
  width:0;
  height:0;
  border-top:30px solid transparent;
  border-bottom:30px solid transparent;
  border-left:48px solid rgba(255,255,255,0.75);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  transition:opacity .25s ease, transform .25s ease;
  opacity:0.75;
}

.arrow:hover::before{
  opacity:1;
  transform:scale(1.08);
}

.right{ right:20px; }
.left{ left:20px; }

.left::before{
  transform:rotate(180deg);
}

.left:hover::before{
  transform:rotate(180deg) scale(1.08);
}

/* TABLET */
@media (max-width: 1024px){
  .arrow{
    width:96px;
    height:96px;
  }

  .arrow::before{
    border-top:24px solid transparent;
    border-bottom:24px solid transparent;
    border-left:38px solid rgba(255,255,255,0.75);
  }
}

/* TELEFONO VERTICAL */
@media (orientation: portrait) and (max-width: 900px){
  .video-shell{
    width:100vw;
    height:100vh;
    aspect-ratio:auto;
  }

  #video2,
  #video3{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .arrow{
    width:82px;
    height:82px;
  }

  .arrow::before{
    border-top:20px solid transparent;
    border-bottom:20px solid transparent;
    border-left:32px solid rgba(255,255,255,0.75);
  }

  .right{ right:10px; }
  .left{ left:10px; }
}
</style>
</head>

<body>

<div id="slider">

  <div class="page" id="page1">
    <model-viewer
      src="earth plateada.glb"
      camera-controls
      auto-rotate
      auto-rotate-delay="0"
      autoplay
      shadow-intensity="1"
      exposure="1">
    </model-viewer>

    <div class="arrow right" id="to2"></div>
  </div>

  <div class="page" id="page2">
    <div class="video-frame">
      <div class="video-shell">
        <video
          id="video2"
          data-src="VIDEOS/NO_VALORAMOS.webm"
          loop
          muted
          playsinline
          preload="none">
        </video>
      </div>
    </div>

    <div class="arrow left" id="back1"></div>
    <div class="arrow right" id="to3"></div>
  </div>

  <div class="page" id="page3">
    <div class="video-frame">
      <div class="video-shell">
        <video
          id="video3"
          data-src="VIDEOS/Iambig.webm"
          loop
          playsinline
          preload="none">
        </video>
      </div>
    </div>

    <div class="arrow left" id="back2"></div>
    <div class="arrow right" id="home3"></div>
  </div>

</div>

<script>
const slider = document.getElementById("slider");
const video2 = document.getElementById("video2");
const video3 = document.getElementById("video3");

function loadVideo(video){
  if (!video.getAttribute("src")) {
    video.src = video.dataset.src;
    video.load();
  }
}

function unloadVideo(video){
  video.pause();
  video.removeAttribute("src");
  video.load();
}

function goToPage1(){
  slider.style.transform = "translateX(0)";
  unloadVideo(video2);
  unloadVideo(video3);
}

function goToPage2(){
  slider.style.transform = "translateX(-100vw)";
  unloadVideo(video3);
  loadVideo(video2);
  video2.muted = true;
  video2.play().catch(()=>{});
}

function goToPage3(){
  slider.style.transform = "translateX(-200vw)";
  unloadVideo(video2);
  loadVideo(video3);
  video3.muted = false;
  video3.volume = 1;
  video3.play().catch(()=>{});
}

document.getElementById("to2").onclick = goToPage2;
document.getElementById("back1").onclick = goToPage1;
document.getElementById("to3").onclick = goToPage3;
document.getElementById("back2").onclick = goToPage2;
document.getElementById("home3").onclick = goToPage1;
</script>

</body>
</html>
