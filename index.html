<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objeto 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

#slider{
  display:flex;
  width:300%;
  height:100%;
  transition:transform 0.35s ease;
}

.page{
  width:100vw;
  height:100vh;
  position:relative;
  flex:0 0 100vw;
  overflow:hidden;
}

#page1{ background:yellow; }
#page2{ background:black; }
#page3{ background:#ffb347; }

model-viewer{
  width:100%;
  height:100%;
  background:transparent;
}

#video2{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:150px;
  height:150px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.arrow::before{
  content:"";
  width:0;
  height:0;
  border-top:50px solid transparent;
  border-bottom:50px solid transparent;
  border-left:80px solid black;
  opacity:0.75;
  transition:opacity .3s ease, transform .25s ease;
  transform:scale(0.4);
}

.arrow:hover::before{
  opacity:1;
  transform:scale(0.45);
}

.right{
  right:20px;
}

.left{
  left:20px;
}

.left::before{
  transform:scale(0.4) rotate(180deg);
}

.left:hover::before{
  transform:scale(0.45) rotate(180deg);
}

</style>
</head>

<body>

<div id="slider">

<div class="page" id="page1">

<model-viewer
src="earth plateada.glb"
camera-controls
auto-rotate
auto-rotate-delay="0"
autoplay
shadow-intensity="1"
exposure="1">
</model-viewer>

<div class="arrow right" id="to2"></div>

</div>

<div class="page" id="page2">

<video
id="video2"
src="VIDEOS/NO_VALORAMOS.webm"
autoplay
loop
muted
playsinline
preload="auto">
</video>

<div class="arrow left" id="back1"></div>
<div class="arrow right" id="to3"></div>

</div>

<div class="page" id="page3">

<div class="arrow left" id="back2"></div>

</div>

</div>

<script>

const slider = document.getElementById("slider");
const video2 = document.getElementById("video2");

document.getElementById("to2").onclick = () => {
  slider.style.transform = "translateX(-100vw)";
  video2.play().catch(()=>{});
};

document.getElementById("back1").onclick = () => {
  slider.style.transform = "translateX(0)";
};

document.getElementById("to3").onclick = () => {
  slider.style.transform = "translateX(-200vw)";
};

document.getElementById("back2").onclick = () => {
  slider.style.transform = "translateX(-100vw)";
  video2.play().catch(()=>{});
};

</script>

</body>
</html>
