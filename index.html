<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objeto 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

#slider{
  display:flex;
  width:300%;
  height:100%;
  transition:transform 0.35s ease;
}

.page{
  width:100vw;
  height:100vh;
  position:relative;
  flex:0 0 100vw;
  overflow:hidden;
}

#page1{ background:yellow; }
#page2{ background:black; }

#page3{
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
}

model-viewer{
  width:100%;
  height:100%;
  background:transparent;
}

#video2{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

#video3{
  width:100vw;
  height:100vh;
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
}

/* FLECHAS */

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  height:120px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.arrow::before{
  content:"";
  width:0;
  height:0;
  border-top:30px solid transparent;
  border-bottom:30px solid transparent;
  border-left:48px solid rgba(255,255,255,0.75);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  transition:opacity .25s ease, transform .25s ease;
  opacity:0.75;
}

.arrow:hover::before{
  opacity:1;
  transform:scale(1.08);
}

.right{
  right:20px;
}

.left{
  left:20px;
}

.left::before{
  transform:rotate(180deg);
}

.left:hover::before{
  transform:rotate(180deg) scale(1.08);
}

</style>
</head>

<body>

<div id="slider">

<div class="page" id="page1">

<model-viewer
src="earth plateada.glb"
camera-controls
auto-rotate
auto-rotate-delay="0"
autoplay
shadow-intensity="1"
exposure="1">
</model-viewer>

<div class="arrow right" id="to2"></div>

</div>

<div class="page" id="page2">

<video
id="video2"
src="VIDEOS/NO_VALORAMOS.webm"
autoplay
loop
muted
playsinline
preload="auto">
</video>

<div class="arrow left" id="back1"></div>
<div class="arrow right" id="to3"></div>

</div>

<div class="page" id="page3">

<video
id="video3"
src="VIDEOS/Iambig.webm"
loop
playsinline
preload="metadata">
</video>

<div class="arrow left" id="back2"></div>
<div class="arrow right" id="home3"></div>

</div>

</div>

<script>

const slider = document.getElementById("slider");
const video2 = document.getElementById("video2");
const video3 = document.getElementById("video3");

function goToPage1(){
  slider.style.transform = "translateX(0)";
  video2.pause();
  video3.pause();
  video3.currentTime = 0;
}

function goToPage2(){
  slider.style.transform = "translateX(-100vw)";
  video3.pause();
  video3.currentTime = 0;
  video2.play().catch(()=>{});
}

function goToPage3(){
  slider.style.transform = "translateX(-200vw)";
  video2.pause();
  video3.muted = false;
  video3.volume = 1;
  video3.play().catch(()=>{});
}

document.getElementById("to2").onclick = goToPage2;
document.getElementById("back1").onclick = goToPage1;
document.getElementById("to3").onclick = goToPage3;
document.getElementById("back2").onclick = goToPage2;
document.getElementById("home3").onclick = goToPage1;

</script>

</body>
</html>
