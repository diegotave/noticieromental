<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>Objeto 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

#slider{
  display:flex;
  height:100svh;
  height:100dvh;
  transition:transform 0.35s ease;
}

.page{
  width:100vw;
  height:100svh;
  height:100dvh;
  position:relative;
  flex:0 0 100vw;
  overflow:hidden;
}

#page1{ background:yellow; }

.video-page{
  background:black;
}

model-viewer{
  width:100%;
  height:100%;
  background:transparent;
}

/* LOGO BUG */

#logobug{
  position:fixed;
  top:20px;
  right:20px;
  width:150px;
  height:150px;
  z-index:9999;
  pointer-events:none;
  opacity:0;
  visibility:hidden;
  transition:opacity 0.25s ease, visibility 0.25s ease;
}

#logobug.show{
  opacity:1;
  visibility:visible;
}

#logobug model-viewer{
  width:100%;
  height:100%;
  background:transparent;
}

/* VIDEO FRAME */

.video-frame{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  background:black;
}

/* EN DESKTOP/TABLET HORIZONTAL PRIORIZA 16:9 */
.video-shell{
  position:relative;
  width:min(100vw, calc(100dvh * 16 / 9));
  aspect-ratio:16 / 9;
  overflow:hidden;
  background:black;
}

.video-el{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  background:black;
}

/* FLECHAS */

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  height:120px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.arrow::before{
  content:"";
  width:0;
  height:0;
  border-top:30px solid transparent;
  border-bottom:30px solid transparent;
  border-left:48px solid rgba(255,255,255,0.75);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  transition:opacity .25s ease, transform .25s ease;
  opacity:0.75;
}

.arrow:hover::before{
  opacity:1;
  transform:scale(1.08);
}

.right{ right:20px; }
.left{ left:20px; }

.left::before{
  transform:rotate(180deg);
}

.left:hover::before{
  transform:rotate(180deg) scale(1.08);
}

/* TABLET */
@media (max-width:1024px){
  .arrow{
    width:96px;
    height:96px;
  }

  .arrow::before{
    border-top:24px solid transparent;
    border-bottom:24px solid transparent;
    border-left:38px solid rgba(255,255,255,0.75);
  }

  #logobug{
    width:120px;
    height:120px;
    top:16px;
    right:16px;
  }
}

/* TELEFONO / TABLET VERTICAL
   FULL ANCHURA, NO FULL ALTURA */
@media (orientation:portrait){

  .video-shell{
    width:100vw;
    height:auto;
    aspect-ratio:16 / 9;
    max-height:100dvh;
    max-height:100svh;
  }

  .video-el{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .arrow{
    width:82px;
    height:82px;
  }

  .arrow::before{
    border-top:20px solid transparent;
    border-bottom:20px solid transparent;
    border-left:32px solid rgba(255,255,255,0.75);
  }

  .right{ right:10px; }
  .left{ left:10px; }

  #logobug{
    width:90px;
    height:90px;
    top:12px;
    right:12px;
  }
}

</style>
</head>

<body>

<div id="logobug">
  <model-viewer
    src="earth plateada.glb"
    auto-rotate
    auto-rotate-delay="0"
    autoplay
    exposure="1"
    shadow-intensity="0"
    interaction-prompt="none"
    disable-zoom
    disable-pan>
  </model-viewer>
</div>

<div id="slider">

  <div class="page" id="page1">

    <model-viewer
      src="earth plateada.glb"
      camera-controls
      auto-rotate
      auto-rotate-delay="0"
      autoplay
      shadow-intensity="1"
      exposure="1">
    </model-viewer>

    <div class="arrow right" id="toFirstVideo"></div>

  </div>

</div>

<script>

/*
  EL PRIMERO DE ESTA LISTA ES EL VIDEO MAS NUEVO.
  SI AGREGAS UNO NUEVO, PONERLO ARRIBA DE TODO.
*/
const videosData = [
  { src: "VIDEOS/tuprimomarvin.webm", muted: false },
  { src: "VIDEOS/NO_VALORAMOS.webm", muted: true },
  { src: "VIDEOS/Iambig.webm", muted: false }
];

const slider = document.getElementById("slider");
const logobug = document.getElementById("logobug");

function createVideoPages(){
  videosData.forEach((videoData, i) => {
    const pageNumber = i + 2;

    const page = document.createElement("div");
    page.className = "page video-page";
    page.id = `page${pageNumber}`;

    const videoFrame = document.createElement("div");
    videoFrame.className = "video-frame";

    const videoShell = document.createElement("div");
    videoShell.className = "video-shell";

    const video = document.createElement("video");
    video.className = "video-el";
    video.id = `video${pageNumber}`;
    video.dataset.src = videoData.src;
    video.setAttribute("loop", "");
    video.setAttribute("playsinline", "");
    video.setAttribute("preload", "none");

    if(videoData.muted){
      video.muted = true;
      video.setAttribute("muted", "");
    }

    videoShell.appendChild(video);
    videoFrame.appendChild(videoShell);
    page.appendChild(videoFrame);

    const leftArrow = document.createElement("div");
    leftArrow.className = "arrow left";
    leftArrow.dataset.target = pageNumber - 1;
    page.appendChild(leftArrow);

    const rightArrow = document.createElement("div");
    rightArrow.className = "arrow right";

    if(i === videosData.length - 1){
      rightArrow.dataset.target = 1;
    } else {
      rightArrow.dataset.target = pageNumber + 1;
    }

    page.appendChild(rightArrow);
    slider.appendChild(page);
  });
}

createVideoPages();

const totalPages = 1 + videosData.length;
slider.style.width = `${totalPages * 100}%`;

const allVideos = Array.from(document.querySelectorAll(".video-el"));

function loadVideo(video){
  if (!video.getAttribute("src")) {
    video.src = video.dataset.src;
    video.load();
  }
}

function unloadVideo(video){
  video.pause();
  video.removeAttribute("src");
  video.load();
}

function unloadAllVideos(){
  allVideos.forEach(unloadVideo);
}

function updateLogobug(pageNumber){
  if(pageNumber === 1){
    logobug.classList.remove("show");
  } else {
    logobug.classList.add("show");
  }
}

function goToPage(pageNumber){
  const offset = (pageNumber - 1) * 100;
  slider.style.transform = `translateX(-${offset}vw)`;

  unloadAllVideos();

  if(pageNumber >= 2){
    const currentVideo = document.getElementById(`video${pageNumber}`);
    const videoConfig = videosData[pageNumber - 2];

    if(currentVideo){
      loadVideo(currentVideo);
      currentVideo.muted = !!videoConfig.muted;
      currentVideo.volume = videoConfig.muted ? 0 : 1;
      currentVideo.play().catch(()=>{});
    }
  }

  updateLogobug(pageNumber);
}

document.getElementById("toFirstVideo").onclick = () => {
  if(videosData.length > 0){
    goToPage(2);
  }
};

document.addEventListener("click", (e) => {
  const arrow = e.target.closest(".arrow");
  if(!arrow) return;

  const target = Number(arrow.dataset.target);
  if(target){
    goToPage(target);
  }
});

/* ARRANCA EN EL INDEX Y EL LOGOBUG NO APARECE AHI */
goToPage(1);

</script>

</body>
</html>
