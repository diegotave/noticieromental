<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Objeto 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body{
margin:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

model-viewer{
width:100%;
height:100%;
background:rgb(232, 191, 8);
}
</style>

</head>

<body>

  <model-viewer
  src="earth plateada.glb"
  alt="Objeto 3D"
  camera-controls
  auto-rotate
  disable-pan
  shadow-intensity="1"
  exposure="1"
  animation-name="*"
  autoplay
  animation-speed="-1000"
  ar>
  </model-viewer>

</body>
</html>
